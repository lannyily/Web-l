<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quero Receitas</title>
    <style>
        section {
            width: 1200px;
        }

        @media(max-width: 1200px){
            section {
                width: 1000px;
            }
        }

        @media(max-width: 1024px){
            section {
                width: 700px;
            }
        }

        @media(max-width: 768px){
            section {
                width: 400px;
            }
        }

        @media(max-width: 425px){
            section {
                width: 320px;
            }
        }

    </style>
    <link rel="stylesheet" href="tela_inicial.css">
    <!-- Adicione o link para a biblioteca Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<!-- Vai -->
<body class="bg">
    <div class="barra-laranja">
        <h1>Quero Receitas</h1>
        <img src="imagens/image 51.png" class="posicionar-imagem">
        <img src="imagens/Frame.png" class="posicionar-imagem-logo">
        <div class="barra-pesquisa">
            <div class="posicionar-barra-pesquisa">
                <form id="pesquisaForm" action="/resultados" method="get">
            
                    <div class="pesquisa-wrapper">
                        <input type="text" name="q" placeholder="Pesquisar...">
                        <!-- Adicione um ícone de lupa da Font Awesome que atua como botão de pesquisa -->
                        <i class="fas fa-search" onclick="document.getElementById('pesquisaForm').submit()"></i>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="barra-2">
        <img src="imagens/Frame2.png" class="posicionar-icon-casa">
    </div>

    <div id="section1">
        <!-- Conteúdo da seção 1 -->
        <div class="quadro1">
            <img src="imagens/Destaques da Semana.png" class="posicionar-nome-destaques-da-semana">
            <div class="efeito">
                <figure><img src="imagens/images.jpeg" class="posicionar-imagem-comidas-tipicas"></figure>
            </div>
            <div class="quadro-comida-tipica">
                
            </div>

            <div class="efeito">
                <figure><img src="imagens/4-pratos-fitness-para-incluir-no-dia-a-dia-bh-mulher-1.jpg" class="posicionar-comida-fitness"></figure>
            </div>

            <div class="quadro-comida-fitness">

            </div>

            <div class="efeito">
                <figure><img src="imagens/pao-de-queijo.jpg" class="posicionar-comida-airfryer"></figure>
            </div>

            <div class="quadro-comida-airfryer">

            </div>

            <div class="efeito">
                <figure><img src="imagens/bolo-de-cenoura-vegano.jpg" class="posicionar-bolo"></figure>
            </div>

            <div class="quadro-comida-bolo">
                
            </div>

            </div>
    </div>

    <div id="section2">
        <!-- Conteúdo da seção 2 -->
        <div class="quadro2">
            <img src="imagens/imginfedireita.png" class = "posicionar-img-inferior">
        </div>
    </div>

    <!-- Adicione este script para rolar suavemente -->
    <script>
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();

                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>

</html>
