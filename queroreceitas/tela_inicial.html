<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quero Receitas</title>
    <link rel="stylesheet" href="tela_inicial.css">
</head>

<body class="bg">
    <div class="barra-laranja">
        <h1>Quero Receitas</h1>
        <div class="barra-pesquisa">
            <form action="/resultados" method="get">
                <input type="text" name="q" placeholder="Pesquisar...">
                <button type="submit">Pesquisar</button>
            </form>
        </div>
    </div>

    <div class="barra-2">
        <!-- Conteúdo da barra-2 -->
    </div>

    <div id="section1">
        <!-- Conteúdo da seção 1 -->
        <div class="quadro1">
            <!-- Conteúdo do quadro1 -->
        </div>
    </div>

    <div id="section2">
        <!-- Conteúdo da seção 2 -->
        <div class="quadro2">
            <!-- Conteúdo do quadro2 -->
        </div>
    </div>

    <!-- Adicione este script para rolar suavemente -->
    <script>
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();

                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>

</html>
